<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 المنصة التعليمية - مكتبة المناهج</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Cairo', sans-serif; }
    .gradient-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .gradient-secondary { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
    .gradient-success { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
    .gradient-warm { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
    .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .card-hover:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
    .fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .progress-ring { transition: stroke-dashoffset 0.5s ease; }
    .nav-active { background: rgba(255,255,255,0.2); border-bottom: 3px solid white; }
</style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Top Bar -->
<div class="gradient-primary text-white py-3 px-6 shadow-lg">
    <div class="max-w-7xl mx-auto flex items-center justify-between flex-wrap gap-3">
        <div class="flex items-center gap-3">
            <span class="text-3xl"></span>
            <div>
                <h1 class="font-bold text-lg">المنصة التعليمية</h1>
                <p class="text-xs opacity-80">منهج متكامل • تفاعلي • احترافي</p>
            </div>
        </div>
        <div class="flex items-center gap-4 text-sm">
            <span class="hidden md:block">مرحباً بك 👋</span>
            <button onclick="showHome()" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg transition">🏠 الرئيسية</button>
        </div>
    </div>
</div>

<!-- Breadcrumbs -->
<div id="breadcrumbs" class="max-w-7xl mx-auto px-6 py-4 hidden">
    <div class="flex items-center gap-2 text-sm text-gray-600 flex-wrap">
        <button onclick="showHome()" class="hover:text-indigo-600">🏠 الرئيسية</button>
        <span id="bc-terms" class="hidden">›</span>
        <button id="bc-term-btn" class="hidden hover:text-indigo-600"></button>
        <span id="bc-stream" class="hidden">›</span>
        <button id="bc-stream-btn" class="hidden hover:text-indigo-600"></button>
        <span id="bc-grade" class="hidden">›</span>
        <button id="bc-grade-btn" class="hidden hover:text-indigo-600"></button>
        <span id="bc-content" class="hidden">›</span>
        <button id="bc-content-btn" class="hidden hover:text-indigo-600"></button>
    </div>
</div>

<!-- Main Container -->
<div id="app" class="max-w-7xl mx-auto px-4 md:px-6 pb-12">
    <!-- Content rendered here -->
</div>

<!-- Footer -->
<footer class="bg-gray-900 text-white py-8 mt-16">
    <div class="max-w-7xl mx-auto px-6 text-center">
        <p class="text-2xl mb-2">📚✨</p>
        <p class="font-bold">المنصة التعليمية المتكاملة</p>
        <p class="text-sm opacity-70 mt-1">جميع الحقوق محفوظة © 2026</p>
    </div>
</footer>

<script>
// ==================== DATABASE ====================
const DB = {
    terms: [
        { id: 1, name: 'الترم الأول', icon: '📘', color: 'blue' },
        { id: 2, name: 'الترم الثاني', icon: '📗', color: 'green' },
        { id: 3, name: 'الترم الثالث', icon: '📕', color: 'red' }
    ],
    streams: [
        { id: 'advanced', name: 'متقدم', icon: '🚀', desc: 'منهج متقدم ومكثف' },
        { id: 'general', name: 'عام', icon: '📚', desc: 'منهج أساسي وشامل' }
    ],
    grades: [
        { id: 9, name: 'الصف التاسع', icon: '🎒' },
        { id: 10, name: 'الصف العاشر', icon: '📐' },
        { id: 11, name: 'الصف الحادي عشر', icon: '⚡' },
        { id: 12, name: 'الصف الثاني عشر', icon: '🎓' }
    ],
    subjects: [
        { id: 'physics', name: 'الفيزياء', icon: '⚛️', color: 'purple' },
        { id: 'math', name: 'الرياضيات', icon: '📐', color: 'blue' },
        { id: 'chemistry', name: 'الكيمياء', icon: '🧪', color: 'green' },
        { id: 'biology', name: 'الأحياء', icon: '🧬', color: 'emerald' }
    ],
    contentTypes: [
        { id: 'lessons', name: '📖 الشرح', desc: 'دروس تفاعلية' },
        { id: 'exams', name: '📝 الامتحانات', desc: 'اختبارات تفاعلية' },
        { id: 'pdfs', name: '📄 الملخصات', desc: 'ملفات PDF' }
    ],
    // Sample lessons (قابل للتعديل)
    lessons: {
        'physics-g11-advanced-t3': [
            { id: 'momentum', title: 'الزخم والدفع', icon: '💥', duration: '45 دقيقة', completed: false },
            { id: 'quantum', title: 'نظرية الكم', icon: '⚛️', duration: '60 دقيقة', completed: false },
            { id: 'circuits', title: 'الدوائر الكهربائية', icon: '⚡', duration: '50 دقيقة', completed: false }
        ],
        'math-g12-advanced-t3': [
            { id: 'integrals', title: 'التكامل', icon: '∫', duration: '90 دقيقة', completed: false },
            { id: 'derivatives', title: 'المشتقات', icon: 'dx', duration: '75 دقيقة', completed: false }
        ]
    }
};

// ==================== STATE ====================
let state = {
    term: null,
    stream: null,
    grade: null,
    subject: null,
    contentType: null,
    lessonId: null
};

// Load progress
const saved = localStorage.getItem('edu-progress');
if (saved) {
    const progress = JSON.parse(saved);
    Object.keys(progress).forEach(key => {
        if (DB.lessons[key]) {
            DB.lessons[key].forEach(l => {
                if (progress[key].includes(l.id)) l.completed = true;
            });
        }
    });
}

function saveProgress() {
    const progress = {};
    Object.keys(DB.lessons).forEach(key => {
        progress[key] = DB.lessons[key].filter(l => l.completed).map(l => l.id);
    });
    localStorage.setItem('edu-progress', JSON.stringify(progress));
}

// ==================== ROUTER ====================
function showHome() {
    state = { term: null, stream: null, grade: null, subject: null, contentType: null, lessonId: null };
    updateBreadcrumbs();
    renderHome();
}

function selectTerm(id) {
    state.term = DB.terms.find(t => t.id === id);
    updateBreadcrumbs();
    renderStreams();
}

function selectStream(id) {
    state.stream = DB.streams.find(s => s.id === id);
    updateBreadcrumbs();
    renderGrades();
}

function selectGrade(id) {
    state.grade = DB.grades.find(g => g.id === id);
    updateBreadcrumbs();
    renderSubjects();
}

function selectSubject(id) {
    state.subject = DB.subjects.find(s => s.id === id);
    updateBreadcrumbs();
    renderContentTypes();
}

function selectContentType(id) {
    state.contentType = DB.contentTypes.find(c => c.id === id);
    updateBreadcrumbs();
    renderContent();
}

function openLesson(lessonId) {
    state.lessonId = lessonId;
    updateBreadcrumbs();
    renderLesson(lessonId);
}

function updateBreadcrumbs() {
    const bc = document.getElementById('breadcrumbs');
    bc.classList.remove('hidden');
    
    document.getElementById('bc-terms').classList.toggle('hidden', !state.term);
    const termBtn = document.getElementById('bc-term-btn');
    termBtn.classList.toggle('hidden', !state.term);
    if (state.term) termBtn.textContent = state.term.icon + ' ' + state.term.name;
    
    document.getElementById('bc-stream').classList.toggle('hidden', !state.stream);
    const streamBtn = document.getElementById('bc-stream-btn');
    streamBtn.classList.toggle('hidden', !state.stream);
    if (state.stream) streamBtn.textContent = state.stream.name;
    
    document.getElementById('bc-grade').classList.toggle('hidden', !state.grade);
    const gradeBtn = document.getElementById('bc-grade-btn');
    gradeBtn.classList.toggle('hidden', !state.grade);
    if (state.grade) gradeBtn.textContent = state.grade.name;
    
    document.getElementById('bc-content').classList.toggle('hidden', !state.subject);
    const contentBtn = document.getElementById('bc-content-btn');
    contentBtn.classList.toggle('hidden', !state.subject);
    if (state.subject) contentBtn.textContent = state.subject.name;
}

// ==================== RENDERERS ====================
function renderHome() {
    const totalLessons = Object.values(DB.lessons).flat().length;
    const completed = Object.values(DB.lessons).flat().filter(l => l.completed).length;
    const progress = totalLessons > 0 ? Math.round((completed/totalLessons)*100) : 0;

    const app = document.getElementById('app');
    app.innerHTML = `
        <!-- Hero -->
        <div class="gradient-primary rounded-3xl p-8 md:p-12 text-white mb-8 fade-in">
            <div class="flex flex-col md:flex-row items-center justify-between gap-6">
                <div class="text-center md:text-right">
                    <h1 class="text-3xl md:text-5xl font-bold mb-3">🎓 أهلاً بك في منصتك التعليمية</h1>
                    <p class="text-lg opacity-90 mb-4">رحلة تعلم تفاعلية من الصف التاسع للثاني عشر</p>
                    <div class="flex flex-wrap gap-3 justify-center md:justify-start">
                        <span class="bg-white/20 px-4 py-2 rounded-full text-sm">✅ 3 ترمات دراسية</span>
                        <span class="bg-white/20 px-4 py-2 rounded-full text-sm">📚 4 مواد</span>
                        <span class="bg-white/20 px-4 py-2 rounded-full text-sm">🎯 تفاعلي 100%</span>
                    </div>
                </div>
                <div class="text-center">
                    <div class="relative inline-block">
                        <svg class="w-32 h-32 -rotate-90">
                            <circle cx="64" cy="64" r="56" stroke="rgba(255,255,255,0.2)" stroke-width="8" fill="none"/>
                            <circle cx="64" cy="64" r="56" stroke="white" stroke-width="8" fill="none" 
                                    stroke-dasharray="351" stroke-dashoffset="${351 - (351*progress/100)}" 
                                    stroke-linecap="round" class="progress-ring"/>
                        </svg>
                        <div class="absolute inset-0 flex items-center justify-center">
                            <div>
                                <div class="text-3xl font-bold">${progress}%</div>
                                <div class="text-xs">منجز</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 fade-in">
            <div class="bg-white rounded-xl p-5 shadow-md">
                <div class="text-3xl mb-2">📘</div>
                <div class="font-bold text-2xl">3</div>
                <div class="text-sm text-gray-500">ترمات دراسية</div>
            </div>
            <div class="bg-white rounded-xl p-5 shadow-md">
                <div class="text-3xl mb-2">🎓</div>
                <div class="font-bold text-2xl">4</div>
                <div class="text-sm text-gray-500">صفوف دراسية</div>
            </div>
            <div class="bg-white rounded-xl p-5 shadow-md">
                <div class="text-3xl mb-2">⚛️</div>
                <div class="font-bold text-2xl">4</div>
                <div class="text-sm text-gray-500">مواد علمية</div>
            </div>
            <div class="bg-white rounded-xl p-5 shadow-md">
                <div class="text-3xl mb-2">✅</div>
                <div class="font-bold text-2xl">${completed}/${totalLessons}</div>
                <div class="text-sm text-gray-500">درس منجز</div>
            </div>
        </div>

        <!-- Terms Selection -->
        <h2 class="text-2xl font-bold mb-4 text-gray-800">📅 اختر الترم الدراسي</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-5 fade-in">
            ${DB.terms.map(t => `
                <button onclick="selectTerm(${t.id})" 
                    class="card-hover bg-white rounded-2xl p-6 shadow-md text-right border-2 border-transparent hover:border-indigo-500">
                    <div class="text-5xl mb-3">${t.icon}</div>
                    <h3 class="font-bold text-xl mb-1">${t.name}</h3>
                    <p class="text-sm text-gray-500 mb-3">اضغط لاستعراض المحتوى</p>
                    <div class="flex items-center justify-between">
                        <span class="text-indigo-600 text-sm font-semibold">استعرض الآن ←</span>
                        <span class="bg-gray-100 text-xs px-2 py-1 rounded">عام + متقدم</span>
                    </div>
                </button>
            `).join('')}
        </div>
    `;
}

function renderStreams() {
    const app = document.getElementById('app');
    app.innerHTML = `
        <div class="gradient-secondary rounded-3xl p-8 text-white mb-8 fade-in">
            <h1 class="text-3xl md:text-4xl font-bold mb-2">${state.term.icon} ${state.term.name}</h1>
            <p class="opacity-90">اختر القسم الدراسي</p>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 fade-in">
            ${DB.streams.map(s => `
                <button onclick="selectStream('${s.id}')" 
                    class="card-hover bg-white rounded-2xl p-8 shadow-md text-right border-2 border-transparent hover:border-pink-500">
                    <div class="text-6xl mb-4">${s.icon}</div>
                    <h3 class="font-bold text-2xl mb-2">${s.name}</h3>
                    <p class="text-gray-500 mb-4">${s.desc}</p>
                    <div class="flex items-center gap-2 text-pink-600 font-semibold">
                        <span>اضغط للدخول</span>
                        <span>←</span>
                    </div>
                </button>
            `).join('')}
        </div>
    `;
}

function renderGrades() {
    const app = document.getElementById('app');
    app.innerHTML = `
        <div class="gradient-success rounded-3xl p-8 text-white mb-8 fade-in">
            <h1 class="text-3xl md:text-4xl font-bold mb-2">${state.term.icon} ${state.term.name} - ${state.stream.name}</h1>
            <p class="opacity-90">اختر الصف الدراسي</p>
        </div>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-5 fade-in">
            ${DB.grades.map(g => `
                <button onclick="selectGrade(${g.id})" 
                    class="card-hover bg-white rounded-2xl p-6 shadow-md text-center border-2 border-transparent hover:border-blue-500">
                    <div class="text-5xl mb-3">${g.icon}</div>
                    <h3 class="font-bold text-lg">${g.name}</h3>
                    <p class="text-xs text-gray-400 mt-2">اضغط للاستمرار</p>
                </button>
            `).join('')}
        </div>
    `;
}

function renderSubjects() {
    const app = document.getElementById('app');
    app.innerHTML = `
        <div class="gradient-warm rounded-3xl p-8 text-white mb-8 fade-in">
            <h1 class="text-3xl md:text-4xl font-bold mb-2">${state.grade.icon} ${state.grade.name}</h1>
            <p class="opacity-90">${state.term.name} - ${state.stream.name}</p>
        </div>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-5 fade-in">
            ${DB.subjects.map(s => `
                <button onclick="selectSubject('${s.id}')" 
                    class="card-hover bg-white rounded-2xl p-6 shadow-md text-center border-2 border-transparent hover:border-purple-500">
                    <div class="text-5xl mb-3">${s.icon}</div>
                    <h3 class="font-bold text-lg">${s.name}</h3>
                    <p class="text-xs text-gray-400 mt-2">اضغط للدخول</p>
                </button>
            `).join('')}
        </div>
    `;
}

function renderContentTypes() {
    const app = document.getElementById('app');
    app.innerHTML = `
        <div class="bg-gradient-to-br from-indigo-600 to-purple-600 rounded-3xl p-8 text-white mb-8 fade-in">
            <h1 class="text-3xl md:text-4xl font-bold mb-2">${state.subject.icon} ${state.subject.name}</h1>
            <p class="opacity-90">${state.term.name} • ${state.stream.name} • ${state.grade.name}</p>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-5 fade-in">
            ${DB.contentTypes.map(c => `
                <button onclick="selectContentType('${c.id}')" 
                    class="card-hover bg-white rounded-2xl p-8 shadow-md text-center border-2 border-transparent hover:border-indigo-500">
                    <div class="text-6xl mb-3">${c.name.split(' ')[0]}</div>
                    <h3 class="font-bold text-xl mb-2">${c.name.split(' ')[1]}</h3>
                    <p class="text-gray-500 text-sm">${c.desc}</p>
                </button>
            `).join('')}
        </div>
    `;
}

function renderContent() {
    const key = `${state.subject.id}-g${state.grade.id}-${state.stream.id.substring(0,3)}-t${state.term.id}`;
    const lessons = DB.lessons[key] || [];
    const completed = lessons.filter(l => l.completed).length;

    const app = document.getElementById('app');
    
    if (state.contentType.id === 'lessons') {
        app.innerHTML = `
            <div class="bg-gradient-to-br from-emerald-500 to-teal-600 rounded-3xl p-8 text-white mb-8 fade-in">
                <div class="flex justify-between items-center flex-wrap gap-4">
                    <div>
                        <h1 class="text-3xl md:text-4xl font-bold mb-2">📖 الشرح التفاعلي</h1>
                        <p class="opacity-90">${lessons.length} درس متاح</p>
                    </div>
                    <div class="bg-white/20 px-5 py-3 rounded-xl">
                        <div class="text-sm">التقدم</div>
                        <div class="text-2xl font-bold">${completed}/${lessons.length}</div>
                    </div>
                </div>
            </div>
            <div class="space-y-4 fade-in">
                ${lessons.length === 0 ? `
                    <div class="bg-yellow-50 border-2 border-yellow-200 rounded-2xl p-8 text-center">
                        <div class="text-5xl mb-3">🚧</div>
                        <p class="text-gray-600">لا توجد دروس متاحة حالياً. سيتم إضافة المحتوى قريباً.</p>
                    </div>
                ` : lessons.map((l, idx) => `
                    <button onclick="openLesson('${l.id}')" 
                        class="card-hover w-full bg-white rounded-2xl p-5 shadow-md flex items-center gap-4 text-right border-2 ${l.completed ? 'border-green-400' : 'border-transparent hover:border-indigo-500'}">
                        <div class="bg-indigo-100 text-indigo-600 rounded-xl w-14 h-14 flex items-center justify-center text-2xl font-bold flex-shrink-0">
                            ${l.completed ? '✅' : idx + 1}
                        </div>
                        <div class="flex-1">
                            <div class="flex items-center gap-2 flex-wrap">
                                <span class="text-2xl">${l.icon}</span>
                                <h3 class="font-bold text-lg">${l.title}</h3>
                                ${l.completed ? '<span class="bg-green-100 text-green-700 text-xs px-2 py-1 rounded-full">مكتمل ✅</span>' : ''}
                            </div>
                            <p class="text-sm text-gray-500 mt-1">⏱️ ${l.duration}</p>
                        </div>
                        <div class="text-indigo-600 text-2xl">←</div>
                    </button>
                `).join('')}
            </div>
        `;
    } else if (state.contentType.id === 'exams') {
        app.innerHTML = `
            <div class="bg-gradient-to-br from-rose-500 to-pink-600 rounded-3xl p-8 text-white mb-8 fade-in">
                <h1 class="text-3xl md:text-4xl font-bold mb-2">📝 الامتحانات</h1>
                <p class="opacity-90">اختبر معلوماتك وامتحان تفاعلي</p>
            </div>
            <div class="bg-yellow-50 border-2 border-yellow-200 rounded-2xl p-8 text-center fade-in">
                <div class="text-5xl mb-3">🎯</div>
                <p class="text-gray-600 mb-4">الامتحانات التفاعلية متاحة لكل درس</p>
                <button onclick="selectContentType('lessons')" class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-indigo-700 transition">
                    اذهب للشرح أولاً 📖
                </button>
            </div>
        `;
    } else {
        app.innerHTML = `
            <div class="bg-gradient-to-br from-amber-500 to-orange-600 rounded-3xl p-8 text-white mb-8 fade-in">
                <h1 class="text-3xl md:text-4xl font-bold mb-2">📄 الملخصات PDF</h1>
                <p class="opacity-90">ملفات قابلة للتحميل والطباعة</p>
            </div>
            <div class="bg-blue-50 border-2 border-blue-200 rounded-2xl p-8 text-center fade-in">
                <div class="text-5xl mb-3">📥</div>
                <p class="text-gray-600">الملفات قيد التحضير وسيتم رفعها قريباً</p>
            </div>
        `;
    }
}

function renderLesson(id) {
    const lessons = DB.lessons[`${state.subject.id}-g${state.grade.id}-${state.stream.id.substring(0,3)}-t${state.term.id}`] || [];
    const lesson = lessons.find(l => l.id === id);
    
    const app = document.getElementById('app');
    app.innerHTML = `
        <div class="bg-gradient-to-br from-violet-600 to-indigo-700 rounded-3xl p-8 text-white mb-8 fade-in">
            <div class="flex items-center gap-4 mb-4">
                <button onclick="selectContentType('lessons')" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg transition">→ رجوع</button>
            </div>
            <div class="flex items-center gap-4 flex-wrap">
                <span class="text-6xl">${lesson.icon}</span>
                <div>
                    <h1 class="text-3xl md:text-4xl font-bold mb-2">${lesson.title}</h1>
                    <p class="opacity-90">⏱️ ${lesson.duration}</p>
                </div>
            </div>
        </div>

        <div class="grid md:grid-cols-3 gap-6 fade-in">
            <!-- Main Content -->
            <div class="md:col-span-2 space-y-6">
                <div class="bg-white rounded-2xl p-6 shadow-md">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                        <span class="text-2xl">📚</span>
                        مقدمة الدرس
                    </h2>
                    <p class="text-gray-700 leading-relaxed mb-4">
                        مرحباً بك في درس <strong>${lesson.title}</strong>! في هذا الدرس التفاعلي، 
                        سنتعرف على المفاهيم الأساسية والأمثلة التطبيقية والتمارين المحلولة.
                    </p>

                    </div>

}

function markComplete(id) {
    const lessons = DB.lessons[`${state.subject.id}-g${state.grade.id}-${state.stream.id.substring(0,3)}-t${state.term.id}`] || [];
    const lesson = lessons.find(l => l.id === id);
    if (lesson) {
        lesson.completed = !lesson.completed;
        saveProgress();
        renderLesson(id);
    }
}

// Initialize
showHome();
