// === DARK MODE LOGIC ===
const themeToggleBtn = document.getElementById('themeToggle');
const sunIcon = document.getElementById('sunIcon');
const moonIcon = document.getElementById('moonIcon');
const htmlElement = document.documentElement;

function applyTheme(isDark) {
    if (isDark) {
        htmlElement.classList.add('dark');
        sunIcon.classList.remove('hidden');
        moonIcon.classList.add('hidden');
    } else {
        htmlElement.classList.remove('dark');
        sunIcon.classList.add('hidden');
        moonIcon.classList.remove('hidden');
    }
}

const savedTheme = localStorage.getItem('theme');
const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
let isDarkMode = savedTheme === 'dark' || (!savedTheme && systemPrefersDark);
applyTheme(isDarkMode);

themeToggleBtn.addEventListener('click', () => {
    isDarkMode = !isDarkMode;
    applyTheme(isDarkMode);
    localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
});

// === SEARCH LOGIC ===
const searchInputs = [document.getElementById('searchInput'), document.getElementById('mobileSearchInput')];

function performSearch(query) {
    const term = query.toLowerCase().trim();
    
    // إذا كان الحقل فارغاً وأنت في الصفحة الرئيسية، أظهر كل شيء
    if (term === '' && !state.lesson && !state.unit) {
        document.querySelectorAll('#app button, #app a').forEach(el => {
            el.style.display = '';
        });
        return;
    }

    // إذا كنت داخل درس أو وحدة، ارجع للرئيسية أولاً ثم ابحث
    if (state.lesson || state.unit) {
        showHome();
        // ننتظر قليلاً حتى يتم رسم الصفحة الرئيسية ثم نطبق البحث
        setTimeout(() => filterCurriculum(term), 50);
        return;
    }
    
    filterCurriculum(term);
}

function filterCurriculum(term) {
    // نبحث فقط في البطاقات الرئيسية (الترمات) والأزرار الموجودة في الشبكة
    const allButtons = document.querySelectorAll('#app .grid button, #app .space-y-4 button');
    let visibleCount = 0;
    
    allButtons.forEach(el => {
        // نتأكد أن الزر يحتوي على نص يمكن البحث فيه
        const text = el.textContent.toLowerCase();
        
        if (term === '' || text.includes(term)) {
            el.style.display = '';
            el.style.opacity = '1';
            visibleCount++;
        } else {
            el.style.display = 'none';
        }
    });

    // إظهار رسالة "لا توجد نتائج" إذا لم يتم العثور على شيء
    const appDiv = document.getElementById('app');
    let noResultsMsg = document.getElementById('custom-no-results');
    
    if (visibleCount === 0 && term !== '') {
        if (!noResultsMsg) {
            noResultsMsg = document.createElement('div');
            noResultsMsg.id = 'custom-no-results';
            noResultsMsg.className = 'text-center py-12 fade-in';
            noResultsMsg.innerHTML = `
                <div class="text-6xl mb-4">🔍</div>
                <h3 class="text-xl font-bold text-gray-700 dark:text-gray-300 mb-2">لا توجد نتائج مطابقة</h3>
                <p class="text-gray-500 dark:text-gray-400">جرب البحث بكلمات مختلفة مثل "فيزياء"، "مثلثات"، أو "SAT"</p>
            `;
            appDiv.appendChild(noResultsMsg);
        }
    } else {
        if (noResultsMsg) noResultsMsg.remove();
    }
}

// تفعيل البحث عند الكتابة
searchInputs.forEach(input => {
    input.addEventListener('input', (e) => {
        // مزامنة حقل البحث في الجوال مع الكمبيوتر والعكس
        searchInputs.forEach(i => { 
            if(i !== e.target) i.value = e.target.value; 
        });
        performSearch(e.target.value);
    });
});

let state = { term: null, stream: null, program: null, grade: null, subject: null, unit: null, lesson: null };

function getCurriculumKey() {
if (!state.subject || !state.grade || !state.term) return null;
if (!state.stream) return null;
const key = state.stream.id === 'advanced' ? state.program.id : 'general';
return `${state.subject.id}-${state.grade.id}-${key}-${state.term.id}`;
}

function getSubjectKey(subjectId) {
const key = state.stream.id === 'advanced' ? (state.program ? state.program.id : 'advanced') : 'general';
return `${subjectId}-${state.grade.id}-${key}-${state.term.id}`;
}

function isCurrentEnglish() {
return state.program && state.program.isEnglish;
}

function showHome() {
state = { term: null, stream: null, program: null, grade: null, subject: null, unit: null, lesson: null };
updateBreadcrumbs();
renderHome();
window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectTerm(id) {
state.term = DB.terms.find(t => t.id === id);
state.stream = null; state.program = null; state.grade = null; state.subject = null;
state.unit = null; state.lesson = null;
updateBreadcrumbs();
renderStreams();
window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectStream(id) {
state.stream = DB.streams.find(s => s.id === id);
state.program = null; state.grade = null; state.subject = null;
state.unit = null; state.lesson = null;
updateBreadcrumbs();
if (state.stream.id === 'advanced') { renderPrograms(); } else { renderGrades(); }
window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectProgram(id) {
state.program = DB.programs.find(p => p.id === id);
state.grade = null; state.subject = null;
state.unit = null; state.lesson = null;
updateBreadcrumbs();
renderGrades();
window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectGrade(id) {
state.grade = DB.grades.find(g => g.id === id);
state.subject = null;
state.unit = null; state.lesson = null;
updateBreadcrumbs();
renderSubjects();
window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectSubject(id) {
state.subject = DB.subjects.find(s => s.id === id);
state.unit = null; state.lesson = null;
updateBreadcrumbs();
renderUnits();
window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectUnit(unitId) {
const key = getCurriculumKey();
const curriculum = DB.curriculum[key];
if (!curriculum) return;
state.unit = curriculum.units.find(u => u.id === unitId);
state.lesson = null;
updateBreadcrumbs();
renderLessons();
window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectLesson(lessonId) {
state.lesson = state.unit.lessons.find(l => l.id === lessonId);
updateBreadcrumbs();
renderLessonDetails();
window.scrollTo({ top: 0, behavior: 'smooth' });
}

function openExam() {
if (state.lesson && state.lesson.examUrl && state.lesson.examUrl !== '#') {
window.open(state.lesson.examUrl, '_blank');
} else {
alert('الاختبار قيد التحضير! 🚧');
}
}

function openLesson() {
if (state.lesson && state.lesson.lessonUrl && state.lesson.lessonUrl !== '#') {
window.open(state.lesson.lessonUrl, '_blank');
} else {
alert('شرح الدرس قيد التحضير! 🚧');
}
}

function updateBreadcrumbs() {
const bc = document.getElementById('breadcrumbs');
bc.classList.remove('hidden');
const setBC = (sepId, btnId, val, hidden, onClick) => {
document.getElementById(sepId).classList.toggle('hidden', hidden);
const b = document.getElementById(btnId);
b.classList.toggle('hidden', hidden);
if (!hidden) {
b.textContent = val;
b.onclick = onClick;
b.className = 'hover:text-indigo-600 cursor-pointer underline decoration-dotted';
}
};
setBC('bc-term-sep', 'bc-term-btn', state.term ? `${state.term.icon} ${state.term.name}` : '', !state.term, state.term ? () => selectTerm(state.term.id) : null);
setBC('bc-stream-sep', 'bc-stream-btn', state.stream ? state.stream.name : '', !state.stream, state.stream ? () => selectStream(state.stream.id) : null);
setBC('bc-program-sep', 'bc-program-btn', state.program ? `${state.program.icon} ${state.program.name}` : '', !state.program, state.program ? () => selectProgram(state.program.id) : null);
setBC('bc-grade-sep', 'bc-grade-btn', state.grade ? state.grade.name : '', !state.grade, state.grade ? () => selectGrade(state.grade.id) : null);
setBC('bc-subject-sep', 'bc-subject-btn', state.subject ? `${state.subject.icon} ${state.subject.name}` : '', !state.subject, state.subject ? () => selectSubject(state.subject.id) : null);
setBC('bc-unit-sep', 'bc-unit-btn', state.unit ? state.unit.name : '', !state.unit, state.unit ? () => selectUnit(state.unit.id) : null);
setBC('bc-lesson-sep', 'bc-lesson-btn', state.lesson ? state.lesson.title : '', !state.lesson, state.lesson ? () => selectLesson(state.lesson.id) : null);
}

    </div>

<script>
// تسجيل Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => console.log('تم تسجيل Service Worker'))
      .catch(err => console.log('فشل التسجيل:', err));
  });
}

// إدارة التثبيت
let deferredPrompt;
const installButton = document.getElementById('installButton');
const installBar = document.getElementById('installBar');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  // إظهار الزر العائم والشريط السفلي
  installButton.classList.remove('hidden');
  installBar.classList.remove('hidden');
});

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then((choiceResult) => {
      if (choiceResult.outcome === 'accepted') {
        console.log('تم تثبيت التطبيق');
      }
      deferredPrompt = null;
      installButton.classList.add('hidden');
      installBar.classList.add('hidden');
    });
  }
}

// إخفاء الأزرار بعد التثبيت
window.addEventListener('appinstalled', () => {
  installButton.classList.add('hidden');
  installBar.classList.add('hidden');
  deferredPrompt = null;
});
</script>
