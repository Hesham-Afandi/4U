<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 المنصة التعليمية - مكتبة المناهج</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Cairo', sans-serif; }
    .gradient-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .gradient-secondary { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
    .gradient-success { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
    .gradient-warm { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
    .gradient-violet { background: linear-gradient(135deg, #a78bfa 0%, #7c3aed 100%); }
    .gradient-rose { background: linear-gradient(135deg, #fb7185 0%, #e11d48 100%); }
    .gradient-amber { background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); }
    .gradient-teal { background: linear-gradient(135deg, #2dd4bf 0%, #0891b2 100%); }
    .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .card-hover:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
    .fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .progress-ring { transition: stroke-dashoffset 0.5s ease; }
</style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Top Bar -->
<div class="gradient-primary text-white py-3 px-6 shadow-lg sticky top-0 z-50">
    <div class="max-w-7xl mx-auto flex items-center justify-between flex-wrap gap-3">
        <div class="flex items-center gap-3">
            <span class="text-3xl">📚</span>
            <div>
                <h1 class="font-bold text-lg">المنصة التعليمية</h1>
                <p class="text-xs opacity-80">منهج متكامل • تفاعلي • احترافي</p>
            </div>
        </div>
        <div class="flex items-center gap-4 text-sm">
            <span class="hidden md:block">مرحباً بك 👋</span>
            <button onclick="showHome()" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg transition">🏠 الرئيسية</button>
        </div>
    </div>
</div>

<!-- Breadcrumbs -->
<div id="breadcrumbs" class="max-w-7xl mx-auto px-6 py-4 hidden">
    <div class="flex items-center gap-2 text-sm text-gray-600 flex-wrap">
        <button onclick="showHome()" class="hover:text-indigo-600">🏠 الرئيسية</button>
        <span id="bc-term-sep" class="hidden">›</span>
        <button id="bc-term-btn" class="hidden hover:text-indigo-600"></button>
        <span id="bc-stream-sep" class="hidden">›</span>
        <button id="bc-stream-btn" class="hidden hover:text-indigo-600"></button>
        <span id="bc-grade-sep" class="hidden">›</span>
        <button id="bc-grade-btn" class="hidden hover:text-indigo-600"></button>
        <span id="bc-subject-sep" class="hidden">›</span>
        <button id="bc-subject-btn" class="hidden hover:text-indigo-600"></button>
        <span id="bc-unit-sep" class="hidden">›</span>
        <button id="bc-unit-btn" class="hidden hover:text-indigo-600"></button>
        <span id="bc-lesson-sep" class="hidden">›</span>
        <button id="bc-lesson-btn" class="hidden hover:text-indigo-600"></button>
    </div>
</div>

<!-- Main Container -->
<div id="app" class="max-w-7xl mx-auto px-4 md:px-6 pb-12"></div>

<!-- Footer -->
<footer class="bg-gray-900 text-white py-8 mt-16">
    <div class="max-w-7xl mx-auto px-6 text-center">
        <p class="text-2xl mb-2">📚✨</p>
        <p class="font-bold">المنصة التعليمية المتكاملة</p>
        <p class="text-sm opacity-70 mt-1">جميع الحقوق محفوظة © 2026</p>
    </div>
</footer>

<script>
// ==================== DATABASE ====================
const DB = {
    terms: [
        { id: 1, name: 'الترم الأول', icon: '📘' },
        { id: 2, name: 'الترم الثاني', icon: '📗' },
        { id: 3, name: 'الترم الثالث', icon: '📕' }
    ],
    streams: [
        { id: 'advanced', name: 'متقدم', icon: '🚀', desc: 'منهج متقدم ومكثف' },
        { id: 'general', name: 'عام', icon: '📚', desc: 'منهج أساسي وشامل' }
    ],
    grades: [
        { id: 9, name: 'الصف التاسع', icon: '🎒' },
        { id: 10, name: 'الصف العاشر', icon: '📐' },
        { id: 11, name: 'الصف الحادي عشر', icon: '⚡' },
        { id: 12, name: 'الصف الثاني عشر', icon: '🎓' }
    ],
    subjects: [
        { id: 'physics', name: 'الفيزياء', icon: '⚛️' },
        { id: 'math', name: 'الرياضيات', icon: '📐' },
        { id: 'chemistry', name: 'الكيمياء', icon: '🧪' },
        { id: 'biology', name: 'الأحياء', icon: '🧬' }
    ],
    
    // 📚 هيكل الوحدات والدروس والاختبارات
    // المفتاح: {subject}-{grade}-{stream}-{term}
    curriculum: {
        'physics-12-advanced-3': {
            units: [
                {
                    id: 1,
                    name: 'الوحدة الأولى: الكم والضوء',
                    icon: '💡',
                    color: 'from-violet-500 to-purple-600',
                    lessons: [
                        {
                            id: 1,
                            title: 'الدرس الأول: نظرية الكم',
                            icon: '⚛️',
                            duration: '60 دقيقة',
                            examUrl: 'https://hesham-afandi.github.io/12Adv-Ins-Phy-En-T3/',
                            examTitle: 'اختبار نظرية الكم'
                        },
                        {
                            id: 2,
                            title: 'الدرس الثاني: التأثير الكهروضوئي',
                            icon: '💡',
                            duration: '55 دقيقة',
                            examUrl: 'https://hesham-afandi.github.io/12Adv-Ins-Phy-En-T3/',
                            examTitle: 'اختبار التأثير الكهروضوئي'
                        },
                        {
                            id: 3,
                            title: 'الدرس الثالث: موجات دي برولي',
                            icon: '🌊',
                            duration: '45 دقيقة',
                            examUrl: 'https://hesham-afandi.github.io/12Adv-Ins-Phy-En-T3/',
                            examTitle: 'اختبار موجات دي برولي'
                        }
                    ]
                },
                {
                    id: 2,
                    name: 'الوحدة الثانية: الفيزياء النووية',
                    icon: '☢️',
                    color: 'from-rose-500 to-red-600',
                    lessons: [
                        {
                            id: 1,
                            title: 'الدرس الأول: النشاط الإشعاعي',
                            icon: '☢️',
                            duration: '50 دقيقة',
                            examUrl: 'https://hesham-afandi.github.io/12Adv-Ins-Phy-En-T3/',
                            examTitle: 'اختبار النشاط الإشعاعي'
                        },
                        {
                            id: 2,
                            title: 'الدرس الثاني: الانشطار والاندماج',
                            icon: '💥',
                            duration: '65 دقيقة',
                            examUrl: 'https://hesham-afandi.github.io/12Adv-Ins-Phy-En-T3/',
                            examTitle: 'اختبار الانشطار والاندماج'
                        }
                    ]
                }
            ]
        },
        'math-12-advanced-3': {
            units: [
                {
                    id: 1,
                    name: 'الوحدة الأولى: التفاضل',
                    icon: '📈',
                    color: 'from-blue-500 to-cyan-600',
                    lessons: [
                        {
                            id: 1,
                            title: 'الدرس الأول: المشتقات',
                            icon: 'd/dx',
                            duration: '75 دقيقة',
                            examUrl: 'https://hesham-afandi.github.io/12Adv-Ins-Phy-En-T3/',
                            examTitle: 'اختبار المشتقات'
                        },
                        {
                            id: 2,
                            title: 'الدرس الثاني: التكامل',
                            icon: '∫',
                            duration: '90 دقيقة',
                            examUrl: 'https://hesham-afandi.github.io/12Adv-Ins-Phy-En-T3/',
                            examTitle: 'اختبار التكامل'
                        }
                    ]
                }
            ]
        }
    }
};

// ==================== STATE ====================
let state = {
    term: null,
    stream: null,
    grade: null,
    subject: null,
    unit: null,
    lesson: null
};

function getCurriculumKey() {
    if (!state.subject || !state.grade || !state.stream || !state.term) return null;
    const streamNum = state.stream.id === 'advanced' ? 'advanced' : 'general';
    return `${state.subject.id}-${state.grade.id}-${streamNum}-${state.term.id}`;
}
// ==================== ROUTER ====================
function showHome() {
    state = { term: null, stream: null, grade: null, subject: null, unit: null, lesson: null };
    updateBreadcrumbs();
    renderHome();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectTerm(id) {
    state.term = DB.terms.find(t => t.id === id);
    state.stream = null; state.grade = null; state.subject = null;
    state.unit = null; state.lesson = null;
    updateBreadcrumbs();
    renderStreams();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectStream(id) {
    state.stream = DB.streams.find(s => s.id === id);
    state.grade = null; state.subject = null;
    state.unit = null; state.lesson = null;
    updateBreadcrumbs();
    renderGrades();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectGrade(id) {
    state.grade = DB.grades.find(g => g.id === id);
    state.subject = null;
    state.unit = null; state.lesson = null;
    updateBreadcrumbs();
    renderSubjects();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectSubject(id) {
    state.subject = DB.subjects.find(s => s.id === id);
    state.unit = null; state.lesson = null;
    updateBreadcrumbs();
    renderUnits();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectUnit(unitId) {
    const key = getCurriculumKey();
    const curriculum = DB.curriculum[key];
    if (!curriculum) return;
    state.unit = curriculum.units.find(u => u.id === unitId);
    state.lesson = null;
    updateBreadcrumbs();
    renderLessons();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectLesson(lessonId) {
    state.lesson = state.unit.lessons.find(l => l.id === lessonId);
    updateBreadcrumbs();
    renderLessonDetails();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function openExam() {
    if (state.lesson && state.lesson.examUrl) {
        window.open(state.lesson.examUrl, '_blank');
    }
}

function updateBreadcrumbs() {
    const bc = document.getElementById('breadcrumbs');
    bc.classList.remove('hidden');
    
    const setBC = (sepId, btnId, val, hidden) => {
        document.getElementById(sepId).classList.toggle('hidden', hidden);
        const b = document.getElementById(btnId);
        b.classList.toggle('hidden', hidden);
        if (!hidden) b.textContent = val;
    };
    
    setBC('bc-term-sep', 'bc-term-btn', state.term ? `${state.term.icon} ${state.term.name}` : '', !state.term);
    setBC('bc-stream-sep', 'bc-stream-btn', state.stream ? state.stream.name : '', !state.stream);
    setBC('bc-grade-sep', 'bc-grade-btn', state.grade ? state.grade.name : '', !state.grade);
    setBC('bc-subject-sep', 'bc-subject-btn', state.subject ? `${state.subject.icon} ${state.subject.name}` : '', !state.subject);
    setBC('bc-unit-sep', 'bc-unit-btn', state.unit ? state.unit.name : '', !state.unit);
    setBC('bc-lesson-sep', 'bc-lesson-btn', state.lesson ? state.lesson.title : '', !state.lesson);
}

// ==================== RENDERERS ====================
function renderHome() {
    const app = document.getElementById('app');
    app.innerHTML = `
        <div class="gradient-primary rounded-3xl p-8 md:p-12 text-white mb-8 fade-in">
            <div class="text-center md:text-right">
                <h1 class="text-3xl md:text-5xl font-bold mb-3">🎓 أهلاً بك في منصتك التعليمية</h1>
                <p class="text-lg opacity-90 mb-4">رحلة تعلم تفاعلية من الصف التاسع للثاني عشر</p>
            </div>
        </div>

        <h2 class="text-2xl font-bold mb-4 text-gray-800">📅 اختر الترم الدراسي</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-5 fade-in">
            ${DB.terms.map(t => `
                <button onclick="selectTerm(${t.id})" 
                    class="card-hover bg-white rounded-2xl p-6 shadow-md text-right border-2 border-transparent hover:border-indigo-500">
                    <div class="text-5xl mb-3">${t.icon}</div>
                    <h3 class="font-bold text-xl mb-1">${t.name}</h3>
                    <p class="text-sm text-gray-500 mb-3">اضغط لاستعراض المحتوى</p>
                    <div class="flex items-center justify-between">
                        <span class="text-indigo-600 text-sm font-semibold">استعرض الآن ←</span>
                        <span class="bg-gray-100 text-xs px-2 py-1 rounded">عام + متقدم</span>
                    </div>
                </button>
            `).join('')}
        </div>
    `;
}

function renderStreams() {
    const app = document.getElementById('app');
    app.innerHTML = `
        <div class="gradient-secondary rounded-3xl p-8 text-white mb-8 fade-in">
            <h1 class="text-3xl md:text-4xl font-bold mb-2">${state.term.icon} ${state.term.name}</h1>
            <p class="opacity-90">اختر القسم الدراسي</p>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 fade-in">
            ${DB.streams.map(s => `
                <button onclick="selectStream('${s.id}')" 
                    class="card-hover bg-white rounded-2xl p-8 shadow-md text-right border-2 border-transparent hover:border-pink-500">
                    <div class="text-6xl mb-4">${s.icon}</div>
                    <h3 class="font-bold text-2xl mb-2">${s.name}</h3>
                    <p class="text-gray-500 mb-4">${s.desc}</p>
                    <div class="flex items-center gap-2 text-pink-600 font-semibold">
                        <span>اضغط للدخول</span>
                        <span>←</span>
                    </div>
                </button>
            `).join('')}
        </div>
    `;
}

function renderGrades() {
    const app = document.getElementById('app');
    app.innerHTML = `
        <div class="gradient-success rounded-3xl p-8 text-white mb-8 fade-in">
            <h1 class="text-3xl md:text-4xl font-bold mb-2">${state.term.icon} ${state.term.name} - ${state.stream.name}</h1>
            <p class="opacity-90">اختر الصف الدراسي</p>
        </div>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-5 fade-in">
            ${DB.grades.map(g => `
                <button onclick="selectGrade(${g.id})" 
                    class="card-hover bg-white rounded-2xl p-6 shadow-md text-center border-2 border-transparent hover:border-blue-500">
                    <div class="text-5xl mb-3">${g.icon}</div>
                    <h3 class="font-bold text-lg">${g.name}</h3>
                </button>
            `).join('')}
        </div>
    `;
}

function renderSubjects() {
    const app = document.getElementById('app');
    app.innerHTML = `
        <div class="gradient-warm rounded-3xl p-8 text-white mb-8 fade-in">
            <h1 class="text-3xl md:text-4xl font-bold mb-2">${state.grade.icon} ${state.grade.name}</h1>
            <p class="opacity-90">${state.term.name} • ${state.stream.name}</p>
        </div>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-5 fade-in">
            ${DB.subjects.map(s => {
                const key = `${s.id}-${state.grade.id}-${state.stream.id}-${state.term.id}`;
                const hasContent = DB.curriculum[key] ? true : false;
                return `
                    <button onclick="selectSubject('${s.id}')" 
                        class="card-hover bg-white rounded-2xl p-6 shadow-md text-center border-2 border-transparent hover:border-purple-500">
                        <div class="text-5xl mb-3">${s.icon}</div>
                        <h3 class="font-bold text-lg">${s.name}</h3>
                        <p class="text-xs text-gray-500 mt-2">
                            ${hasContent ? '✅ متاح' : '🚧 قريباً'}
                        </p>
                    </button>
                `;
            }).join('')}
        </div>
    `;
}

function renderUnits() {
    const key = getCurriculumKey();
    const curriculum = DB.curriculum[key];
    const app = document.getElementById('app');
    
    if (!curriculum) {
        app.innerHTML = `
            <div class="bg-gradient-to-br from-gray-500 to-gray-700 rounded-3xl p-8 text-white mb-8 fade-in">
                <h1 class="text-3xl font-bold mb-2">${state.subject.icon} ${state.subject.name}</h1>
                <p class="opacity-90">${state.term.name} • ${state.stream.name} • ${state.grade.name}</p>
            </div>
            <div class="bg-yellow-50 border-2 border-yellow-200 rounded-2xl p-8 text-center fade-in">
                <div class="text-5xl mb-3">🚧</div>
                <p class="text-gray-600">المحتوى قيد التحضير وسيتم إضافته قريباً</p>
            </div>
        `;
        return;
    }
    
    app.innerHTML = `
        <div class="bg-gradient-to-br from-indigo-600 to-purple-600 rounded-3xl p-8 text-white mb-8 fade-in">
            <h1 class="text-3xl md:text-4xl font-bold mb-2">${state.subject.icon} ${state.subject.name}</h1>
            <p class="opacity-90">${state.term.name} • ${state.stream.name} • ${state.grade.name}</p>
        </div>
        
        <h2 class="text-2xl font-bold mb-4 text-gray-800">📚 اختر الوحدة</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 fade-in">
            ${curriculum.units.map(u => `
                <button onclick="selectUnit(${u.id})" 
                    class="card-hover bg-white rounded-2xl p-6 shadow-md text-right border-2 border-transparent hover:border-indigo-500">
                    <div class="flex items-center gap-4 mb-3">
                        <div class="bg-gradient-to-br ${u.color} w-16 h-16 rounded-xl flex items-center justify-center text-3xl">
                            ${u.icon}
                        </div>
                        <div class="flex-1">
                            <h3 class="font-bold text-xl">${u.name}</h3>
                            <p class="text-sm text-gray-500 mt-1">📖 ${u.lessons.length} دروس</p>
                        </div>
                    </div>
                    <div class="flex items-center justify-between text-indigo-600 font-semibold text-sm">
                        <span>استعرض الدروس</span>
                        <span>←</span>
                    </div>
                </button>
            `).join('')}
        </div>
    `;
}

function renderLessons() {
    const app = document.getElementById('app');
    app.innerHTML = `
        <div class="gradient-violet rounded-3xl p-8 text-white mb-8 fade-in">
            <h1 class="text-3xl md:text-4xl font-bold mb-2">${state.unit.icon} ${state.unit.name}</h1>
            <p class="opacity-90">${state.subject.name} • ${state.grade.name}</p>
        </div>
        
        <h2 class="text-2xl font-bold mb-4 text-gray-800">📖 الدروس</h2>
        <div class="space-y-4 fade-in">
            ${state.unit.lessons.map((l, idx) => `
                <button onclick="selectLesson(${l.id})" 
                    class="card-hover w-full bg-white rounded-2xl p-5 shadow-md flex items-center gap-4 text-right border-2 border-transparent hover:border-violet-500">
                    <div class="bg-violet-100 text-violet-600 rounded-xl w-14 h-14 flex items-center justify-center text-2xl font-bold flex-shrink-0">
                        ${l.icon}
                    </div>
                    <div class="flex-1">
                        <h3 class="font-bold text-lg">${l.title}</h3>
                        <p class="text-sm text-gray-500 mt-1">⏱️ ${l.duration}</p>
                    </div>
                    <div class="text-violet-600 text-2xl">←</div>
                </button>
            `).join('')}
        </div>
    `;
}

function renderLessonDetails() {
    const app = document.getElementById('app');
    app.innerHTML = `
        <div class="gradient-teal rounded-3xl p-8 text-white mb-8 fade-in">
            <div class="flex items-center gap-4 mb-4">
                <button onclick="selectUnit(${state.unit.id})" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg transition">
                    → رجوع للوحدة
                </button>
            </div>
            <div class="flex items-center gap-4 flex-wrap">
                <span class="text-6xl">${state.lesson.icon}</span>
                <div>
                    <h1 class="text-3xl md:text-4xl font-bold mb-2">${state.lesson.title}</h1>
                    <p class="opacity-90">⏱️ ${state.lesson.duration}</p>
                </div>
            </div>
        </div>

        <div class="grid md:grid-cols-2 gap-6 fade-in">
            <!-- محتوى الدرس -->
            <div class="bg-white rounded-2xl p-6 shadow-md">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                    <span class="text-2xl">📚</span> محتوى الدرس
                </h2>
                <div class="space-y-3">
                    <div class="bg-indigo-50 border-r-4 border-indigo-500 p-4 rounded-lg">
                        <strong class="text-indigo-700">🎯 أهداف الدرس:</strong>
                        <ul class="mt-2 space-y-1 text-sm text-gray-700">
                            <li>✅ فهم المفاهيم الأساسية</li>
                            <li>✅ حل المسائل التطبيقية</li>
                            <li>✅ تطبيق المعرفة في مواقف جديدة</li>
                        </ul>
                    </div>
                    
                    <div class="bg-blue-50 border-r-4 border-blue-500 p-4 rounded-lg">
                        <strong class="text-blue-700">📖 الشرح:</strong>
                        <p class="text-gray-700 mt-2 text-sm">
                            في هذا الدرس ستتعلم المفاهيم الأساسية والنظريات المهمة مع أمثلة تطبيقية محلولة.
                        </p>
                    </div>
                </div>
            </div>

            <!-- الاختبار -->
            <div class="bg-white rounded-2xl p-6 shadow-md border-2 border-emerald-200">
