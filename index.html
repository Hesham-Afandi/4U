<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>المنصة التعليمية المتكاملة 4U</title>
    <!-- Favicon configuration -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Google Identity Services for Direct Google Sign-In -->
    <script src="https://accounts.google.com/gsi/client" id="google-gis-script" async defer></script>
    
    <!-- Inline script to capture PWA installation prompt immediately -->
    <script>
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.deferredPrompt = e;
        if (window.onBeforeInstallPrompt) {
          window.onBeforeInstallPrompt(e);
        }
      });

      // Register Service Worker for PWA compliance
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          const base = window.location.pathname.endsWith('/') 
            ? window.location.pathname 
            : window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
          navigator.serviceWorker.register(base + 'sw.js').then((reg) => {
            console.log('ServiceWorker registered successfully:', reg.scope);
          }).catch((err) => {
            console.error('ServiceWorker registration failed:', err);
          });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
