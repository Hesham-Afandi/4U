#page-loader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    transition: opacity 0.8s ease, visibility 0.8s ease;
}

#page-loader::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url('loader.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    filter: blur(8px) brightness(0.4);
    transform: scale(1.1);
    z-index: -1;
}

#page-loader::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, 
        rgba(102, 126, 234, 0.3) 0%, 
        rgba(118, 75, 162, 0.3) 100%);
    z-index: -1;
}

.loader-spinner {
    width: 80px;
    height: 80px;
    border: 5px solid rgba(255, 255, 255, 0.2);
    border-top: 5px solid #ffffff;
    border-right: 5px solid #fbbf24;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 2rem;
    box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.loader-text {
    color: #ffffff;
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    animation: textPulse 2s ease-in-out infinite;
}

@keyframes textPulse {
    0%, 100% { 
        opacity: 0.7;
        transform: scale(1);
    }
    50% { 
        opacity: 1;
        transform: scale(1.05);
    }
}

.loader-dots {
    display: inline-flex;
    gap: 4px;
    margin-right: 8px;
}

.loader-dots span {
    width: 8px;
    height: 8px;
    background: #fbbf24;
    border-radius: 50%;
    animation: dotBounce 1.4s ease-in-out infinite;
}

.loader-dots span:nth-child(2) { animation-delay: 0.2s; }
.loader-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes dotBounce {
    0%, 80%, 100% { 
        transform: scale(0.6);
        opacity: 0.5;
    }
    40% { 
        transform: scale(1);
        opacity: 1;
    }
}

.loader-progress {
    width: 240px;
    height: 4px;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 2px;
    margin-top: 2rem;
    overflow: hidden;
    position: relative;
}

.loader-progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #fbbf24, #f59e0b);
    width: 0%;
    animation: progressFill 2.5s ease-in-out forwards;
    border-radius: 2px;
    box-shadow: 0 0 10px rgba(251, 191, 36, 0.8);
}

@keyframes progressFill {
    0% { width: 0%; }
    50% { width: 70%; }
    100% { width: 100%; }
}

#page-loader.hidden-loader {
    opacity: 0;
    visibility: hidden;
}

#main-content {
    opacity: 0;
    transition: opacity 0.8s ease;
}

#main-content.visible {
    opacity: 1;
}

window.addEventListener('load', () => {
    const loader = document.getElementById('page-loader');
    const mainContent = document.getElementById('main-content');
    
    setTimeout(() => {
        loader.classList.add('hidden-loader');
        mainContent.classList.add('visible');
        
        setTimeout(() => {
            loader.style.display = 'none';
        }, 800);
    }, 2500);
});

document.getElementById('page-loader').addEventListener('click', function() {
    this.classList.add('hidden-loader');
    document.getElementById('main-content').classList.add('visible');
    setTimeout(() => {
        this.style.display = 'none';
    }, 800);
});

// === DARK MODE LOGIC ===
const themeToggleBtn = document.getElementById('themeToggle');
const sunIcon = document.getElementById('sunIcon');
const moonIcon = document.getElementById('moonIcon');
const htmlElement = document.documentElement;
function applyTheme(isDark) {
if (isDark) {
htmlElement.classList.add('dark');
sunIcon.classList.remove('hidden');
moonIcon.classList.add('hidden');
} else {
htmlElement.classList.remove('dark');
sunIcon.classList.add('hidden');
moonIcon.classList.remove('hidden');
}
}
const savedTheme = localStorage.getItem('theme');
const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
let isDarkMode = savedTheme === 'dark' || (!savedTheme && systemPrefersDark);
applyTheme(isDarkMode);
themeToggleBtn.addEventListener('click', () => {
isDarkMode = !isDarkMode;
applyTheme(isDarkMode);
localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
});

// === SEARCH LOGIC ===
const searchInputs = [document.getElementById('searchInput'), document.getElementById('mobileSearchInput')];
function performSearch(query) {
const term = query.toLowerCase().trim();
if (term === '' && !state.lesson && !state.unit) {
document.querySelectorAll('#app button, #app a').forEach(el => {
el.style.display = '';
});
return;
}
if (state.lesson || state.unit) {
showHome();
setTimeout(() => filterCurriculum(term), 50);
return;
}
filterCurriculum(term);
}
function filterCurriculum(term) {
const allButtons = document.querySelectorAll('#app .grid button, #app .space-y-4 button');
let visibleCount = 0;
allButtons.forEach(el => {
const text = el.textContent.toLowerCase();
if (term === '' || text.includes(term)) {
el.style.display = '';
el.style.opacity = '1';
visibleCount++;
} else {
el.style.display = 'none';
}
});
const appDiv = document.getElementById('app');
let noResultsMsg = document.getElementById('custom-no-results');
if (visibleCount === 0 && term !== '') {
if (!noResultsMsg) {
noResultsMsg = document.createElement('div');
noResultsMsg.id = 'custom-no-results';
noResultsMsg.className = 'text-center py-12 fade-in';
noResultsMsg.innerHTML = `
<div class="text-6xl mb-4">🔍</div>
<h3 class="text-xl font-bold text-gray-700 dark:text-gray-300 mb-2">لا توجد نتائج مطابقة</h3>
<p class="text-gray-500 dark:text-gray-400">جرب البحث بكلمات مختلفة مثل "فيزياء"، "مثلثات"، أو "SAT"</p>
`;
appDiv.appendChild(noResultsMsg);
}
} else {
if (noResultsMsg) noResultsMsg.remove();
}
}
searchInputs.forEach(input => {
input.addEventListener('input', (e) => {
searchInputs.forEach(i => {
if(i !== e.target) i.value = e.target.value;
});
performSearch(e.target.value);
});
});

<!-- زر التثبيت العائم - تصميم محسّن -->
<div id="installButton" class="hidden fixed bottom-6 left-6 z-50">
    <button onclick="installApp()" 
            class="group relative bg-gradient-to-br from-teal-500 to-cyan-600 hover:from-teal-600 hover:to-cyan-700 text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center transition-all duration-300 transform hover:scale-110 hover:shadow-teal-500/50"
            title="تثبيت التطبيق">
        
        <!-- أيقونة التثبيت -->
        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 transition-transform duration-300 group-hover:-translate-y-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
        </svg>
        
        <!-- نبضة خفيفة لجذب الانتباه -->
        <span class="absolute inset-0 rounded-full bg-teal-400 opacity-75 animate-ping"></span>
        
        <!-- Tooltip عند التمرير -->
        <span class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 px-3 py-1.5 bg-gray-900 text-white text-xs font-semibold rounded-lg opacity-0 group-hover:opacity-100 transition-opacity duration-300 whitespace-nowrap pointer-events-none shadow-lg">
            📲 تثبيت التطبيق
            <span class="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-gray-900"></span>
        </span>
    </button>
</div>
</div>
<script>
// تسجيل Service Worker
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('✅ تم تسجيل Service Worker'))
            .catch(err => console.log('❌ فشل التسجيل:', err));
    });
}

// إدارة التثبيت
let deferredPrompt;
const installButton = document.getElementById('installButton');

window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    console.log('📥 حدث التثبيت متوفر');
    
    // إظهار الزر العائم مع تأثير ظهور
    installButton.classList.remove('hidden');
    installButton.style.animation = 'fadeInUp 0.5s ease-out';
});

// إضافة أنيميشن الظهور
const style = document.createElement('style');
style.textContent = `
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
`;
document.head.appendChild(style);

function installApp() {
    if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then((choiceResult) => {
            if (choiceResult.outcome === 'accepted') {
                console.log('✅ تم تثبيت التطبيق');
            }
            deferredPrompt = null;
            installButton.classList.add('hidden');
        });
    }
}

// إخفاء الزر بعد التثبيت
window.addEventListener('appinstalled', () => {
    installButton.classList.add('hidden');
    deferredPrompt = null;
    console.log('🎉 تم تثبيت التطبيق بنجاح');
});
</script>
</script>
</body>
</html>
