// ==================== STATE ====================
let state = { term: null, stream: null, program: null, grade: null, subject: null, unit: null, lesson: null };

function getCurriculumKey() {
    if (!state.subject || !state.grade || !state.program || !state.term) return null;
    const key = state.stream.id === 'advanced' ? state.program.id : 'general';
    return `${state.subject.id}-${state.grade.id}-${key}-${state.term.id}`;
}

function getSubjectKey(subjectId) {
    const key = state.stream.id === 'advanced' ? (state.program ? state.program.id : 'advanced') : 'general';
    return `${subjectId}-${state.grade.id}-${key}-${state.term.id}`;
}

function isCurrentEnglish() {
    return state.program && state.program.isEnglish;
}

// ==================== ROUTER ====================
function showHome() {
    state = { term: null, stream: null, program: null, grade: null, subject: null, unit: null, lesson: null };
    updateBreadcrumbs();
    renderHome();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectTerm(id) {
    state.term = DB.terms.find(t => t.id === id);
    state.stream = null; state.program = null; state.grade = null; state.subject = null;
    state.unit = null; state.lesson = null;
    updateBreadcrumbs();
    renderStreams();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectStream(id) {
    state.stream = DB.streams.find(s => s.id === id);
    state.program = null; state.grade = null; state.subject = null;
    state.unit = null; state.lesson = null;
    updateBreadcrumbs();
    if (state.stream.id === 'advanced') { renderPrograms(); } else { renderGrades(); }
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectProgram(id) {
    state.program = DB.programs.find(p => p.id === id);
    state.grade = null; state.subject = null;
    state.unit = null; state.lesson = null;
    updateBreadcrumbs();
    renderGrades();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectGrade(id) {
    state.grade = DB.grades.find(g => g.id === id);
    state.subject = null;
    state.unit = null; state.lesson = null;
    updateBreadcrumbs();
    renderSubjects();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectSubject(id) {
    state.subject = DB.subjects.find(s => s.id === id);
    state.unit = null; state.lesson = null;
    updateBreadcrumbs();
    renderUnits();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectUnit(unitId) {
    const key = getCurriculumKey();
    const curriculum = DB.curriculum[key];
    if (!curriculum) return;
    state.unit = curriculum.units.find(u => u.id === unitId);
    state.lesson = null;
    updateBreadcrumbs();
    renderLessons();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectLesson(lessonId) {
    state.lesson = state.unit.lessons.find(l => l.id === lessonId);
    updateBreadcrumbs();
    renderLessonDetails();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function openExam() {
    if (state.lesson && state.lesson.examUrl && state.lesson.examUrl !== '#') {
        window.open(state.lesson.examUrl, '_blank');
    } else {
        alert('الاختبار قيد التحضير! 🚧');
    }
}

function openLesson() {
    if (state.lesson && state.lesson.lessonUrl && state.lesson.lessonUrl !== '#') {
        window.open(state.lesson.lessonUrl, '_blank');
    } else {
        alert('شرح الدرس قيد التحضير! 🚧');
    }
}

// ==================== BREADCRUMBS ====================
function updateBreadcrumbs() {
    const bc = document.getElementById('breadcrumbs');
    bc.classList.remove('hidden');
    
    const setBC = (sepId, btnId, val, hidden, onClick) => {
        document.getElementById(sepId).classList.toggle('hidden', hidden);
        const b = document.getElementById(btnId);
        b.classList.toggle('hidden', hidden);
        if (!hidden) {
            b.textContent = val;
            b.onclick = onClick;
            b.className = 'hover:text-indigo-600 cursor-pointer underline decoration-dotted';
        }
    };
    
    setBC('bc-term-sep', 'bc-term-btn', state.term ? `${state.term.icon} ${state.term.name}` : '', !state.term, state.term ? () => selectTerm(state.term.id) : null);
    setBC('bc-stream-sep', 'bc-stream-btn', state.stream ? state.stream.name : '', !state.stream, state.stream ? () => selectStream(state.stream.id) : null);
    setBC('bc-program-sep', 'bc-program-btn', state.program ? `${state.program.icon} ${state.program.name}` : '', !state.program, state.program ? () => selectProgram(state.program.id) : null);
    setBC('bc-grade-sep', 'bc-grade-btn', state.grade ? state.grade.name : '', !state.grade, state.grade ? () => selectGrade(state.grade.id) : null);
    setBC('bc-subject-sep', 'bc-subject-btn', state.subject ? `${state.subject.icon} ${state.subject.name}` : '', !state.subject, state.subject ? () => selectSubject(state.subject.id) : null);

function renderLessonDetails() {
    const c = state.lesson.content;
    const programInfo = state.program ? ` • ${state.program.name}` : '';
    const isEnglish = isCurrentEnglish();
    const contentClass = isEnglish ? 'en-content' : '';
    
    let sectionsHTML = '';
    if (c && c.sections) {
        sectionsHTML = c.sections.map(s => {
            if (s.type === 'formula') {
                return `<div class="bg-gradient-to-br from-indigo-50 to-purple-50 rounded-xl p-6 my-4 border-2 border-indigo-200 text-center">
                    <div class="text-xs text-indigo-600 mb-2 font-semibold">${s.title}</div>
                    <div class="formula text-3xl font-bold text-indigo-800">${s.content}</div>
                </div>`;
            } else if (s.type === 'table') {
                return `<div class="my-4">
                    <h4 class="font-bold text-lg mb-3 text-gray-800">${s.title}</h4>
                    <div class="overflow-x-auto">
                        <table class="comparison">
                            <thead><tr>${s.headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
                            <tbody>${s.rows.map(row => `<tr>${row.map(cell => `<td>${cell}</td>`).join('')}</tr>`).join('')}</tbody>
                        </table>
                    </div>
                </div>`;
            } else if (s.type === 'bullets') {
                return `<div class="my-4 bg-blue-50 rounded-xl p-5 border-l-4 border-blue-500">
                    <h4 class="font-bold text-lg mb-3 text-blue-800">${s.title}</h4>
                    <ul class="space-y-2">${s.content.map(item => `<li class="flex items-start gap-2"><span class="text-blue-600 mt-1">✅</span><span class="text-gray-700">${item}</span></li>`).join('')}</ul>
                </div>`;
            } else {
                return `<div class="my-4"><h4 class="font-bold text-lg mb-2 text-gray-800">${s.title}</h4><p class="text-gray-700 leading-relaxed">${s.content}</p></div>`;
            }
        }).join('');
    }
    
    document.getElementById('app').innerHTML = `
        <div class="gradient-teal rounded-3xl p-8 text-white mb-8 fade-in">
            <div class="flex items-center gap-4 mb-4 flex-wrap">
                <button onclick="selectUnit(${state.unit.id})" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg transition">${isEnglish ? '← Back to Unit' : '→ رجوع للوحدة'}</button>
            </div>
            <div class="flex items-center gap-4 flex-wrap ${contentClass}">
                <span class="text-6xl">${state.lesson.icon}</span>
                <div>
                    <h1 class="text-3xl md:text-4xl font-bold mb-2">${state.lesson.title}</h1>
                    <p class="opacity-90">⏱️ ${state.lesson.duration} • ${state.subject.name}${programInfo}</p>
                    ${isEnglish ? '<div class="mt-2 inline-block bg-blue-500 text-white text-xs px-3 py-1 rounded-full">🇬🇧 English</div>' : ''}
                </div>
            </div>
        </div>
        <div class="grid md:grid-cols-3 gap-6 fade-in">
            <div class="md:col-span-2 space-y-6 ${contentClass}">
                ${c ? `
                    <div class="bg-white rounded-2xl p-6 shadow-md">
                        <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><span class="text-2xl">📚</span> ${isEnglish ? 'Lesson Introduction' : 'مقدمة الدرس'}</h2>
                        <div class="bg-gradient-to-r from-purple-50 to-indigo-50 ${isEnglish ? 'border-l-4' : 'border-r-4'} border-purple-500 p-4 rounded-lg"><p class="text-gray-700 leading-relaxed">${c.intro}</p></div>
                    </div>
                    <div class="bg-white rounded-2xl p-6 shadow-md">
                        <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><span class="text-2xl">💡</span> ${isEnglish ? 'Lesson Content' : 'محتوى الدرس'}</h2>
                        ${sectionsHTML}
                    </div>
                ` : `<div class="bg-white rounded-2xl p-6 shadow-md"><h2 class="text-xl font-bold mb-4"><span class="text-2xl">📚</span> ${isEnglish ? 'Lesson Content' : 'محتوى الدرس'}</h2><p class="text-gray-700">${isEnglish ? 'Lesson content is under preparation...' : 'محتوى الدرس قيد التحضير...'}</p></div>`}
            </div>
            <div class="space-y-6">
                <div class="bg-white rounded-2xl p-6 shadow-md sticky top-24">
                    <h3 class="font-bold mb-4 flex items-center gap-2"><span>📋</span> ${isEnglish ? 'Lesson Information' : 'معلومات الدرس'}</h3>
                    <div class="space-y-3 text-sm">
                        <div class="bg-gray-50 p-3 rounded-lg"><span class="text-xs text-gray-500">${isEnglish ? 'Unit' : 'الوحدة'}</span><p class="font-semibold ${contentClass}">${state.unit.name}</p></div>
                        <div class="bg-gray-50 p-3 rounded-lg"><span class="text-xs text-gray-500">${isEnglish ? 'Duration' : 'المدة الزمنية'}</span><p class="font-semibold">⏱️ ${state.lesson.duration}</p></div>
                        <div class="bg-gray-50 p-3 rounded-lg"><span class="text-xs text-gray-500">${isEnglish ? 'Grade' : 'الصف'}</span><p class="font-semibold">${state.grade.name}</p></div>
                    </div>
                    
                    <button onclick="openLesson()" class="mt-6 w-full bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-700 hover:to-cyan-700 text-white py-4 rounded-xl font-bold transition transform hover:scale-105 shadow-lg flex items-center justify-center gap-2">
                        <span class="text-2xl">📖</span><span>${state.lesson.lessonTitle || (isEnglish ? 'Lesson Explanation' : 'شرح الدرس')}</span><span>↗</span>
                    </button>
                    <p class="text-xs text-gray-500 mt-2 text-center">${isEnglish ? 'Opens in new tab' : 'سيفتح في نافذة جديدة'}</p>
                    
                    <button onclick="openExam()" class="mt-3 w-full bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-700 hover:to-teal-700 text-white py-4 rounded-xl font-bold transition transform hover:scale-105 shadow-lg flex items-center justify-center gap-2">
                        <span class="text-2xl">📝</span><span>${state.lesson.examTitle || (isEnglish ? 'Take the Quiz' : 'ابدأ الاختبار')}</span><span>↗</span>
                    </button>
                    <p class="text-xs text-gray-500 mt-2 text-center">${isEnglish ? 'Opens in new tab' : 'سيفتح في نافذة جديدة'}</p>
                </div>
                <div class="bg-amber-50 border-2 border-amber-200 rounded-2xl p-6">
                    <h4 class="font-bold text-amber-700 mb-2 flex items-center gap-2"><span>💡</span> ${isEnglish ? 'Tip' : 'نصيحة'}</h4>
                    <p class="text-sm text-gray-700">${isEnglish ? 'Review the lesson thoroughly before starting the quiz for the best results!' : 'راجع الدرس جيداً قبل البدء في الاختبار للحصول على أفضل نتيجة!'}</p>
                </div>
            </div>
        </div>
    `;
}
